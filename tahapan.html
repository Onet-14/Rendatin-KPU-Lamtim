<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Tahapan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { padding: 25px; background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
        h4 { color: #C8102E; font-weight: bold; }
        
        /* Styling Filter */
        .filter-card {
            background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            margin-bottom: 20px; display: flex; align-items: center; gap: 15px;
        }
        .filter-card label { font-weight: 700; color: #333; white-space: nowrap; }
        .filter-card select { max-width: 300px; border-radius: 8px; border: 1px solid #ccc; padding: 8px 12px; font-weight: 500; }

        /* Styling Summary Cards */
        .summary-card {
            background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            border-left: 5px solid #C8102E; display: flex; align-items: center; justify-content: space-between;
            transition: transform 0.2s; margin-bottom: 20px;
        }
        .summary-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .summary-card .card-icon { font-size: 2.5rem; color: #C8102E; opacity: 0.8; }
        .summary-card .card-value { font-size: 1.8rem; font-weight: 800; color: #333; }
        .summary-card .card-label { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Styling Tabs */
        .nav-tabs .nav-link { color: #555; font-weight: 600; border: none; border-bottom: 3px solid transparent; }
        .nav-tabs .nav-link.active { color: #C8102E; border-bottom: 3px solid #C8102E; background: transparent; }
        .nav-tabs .nav-link:hover { border-color: #C8102E; color: #C8102E; }

        /* Styling Tabel Card */
        .table-card { background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.07); }
        table { font-size: 13px; }
        .dataTables_wrapper .dataTables_filter input { border-radius: 8px; border: 1px solid #ccc; padding: 5px 10px; }
        
        /* Styling Tombol Lihat Rekap */
        .btn-rekap {
            background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba;
            font-size: 11px; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-weight: 600;
            transition: all 0.2s;
        }
        .btn-rekap:hover { background-color: #ffc107; color: #000; border-color: #ffc107; }

        /* Styling Filter Drill Info */
        .filter-info {
            background: #e7f3ff; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px;
            color: #004085; font-weight: 600; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<h4 style="margin-bottom: 20px;"><i class="fas fa-list-ol"></i> Rekap Data Tahapan</h4>

<!-- FILTER TAHAPAN -->
<div class="filter-card">
    <i class="fas fa-filter" style="color: #C8102E; font-size: 1.2rem;"></i>
    <label for="filter-tahapan">Filter Tahapan:</label>
    <select id="filter-tahapan" class="form-select" onchange="applyFilter()">
        <option value="all">Semua Tahapan</option>
    </select>
</div>

<!-- SUMMARY CARDS -->
<div class="row" id="summary-cards">
    <div class="col-lg-2 col-md-4 col-sm-6"><div class="summary-card"><div><div class="card-value" id="sum-kec">0</div><div class="card-label">Jml Kecamatan</div></div><div class="card-icon"><i class="fas fa-map"></i></div></div></div>
    <div class="col-lg-2 col-md-4 col-sm-6"><div class="summary-card"><div><div class="card-value" id="sum-desa">0</div><div class="card-label">Jml Desa</div></div><div class="card-icon"><i class="fas fa-home"></i></div></div></div>
    <div class="col-lg-2 col-md-4 col-sm-6"><div class="summary-card"><div><div class="card-value" id="sum-tps">0</div><div class="card-label">Jml TPS</div></div><div class="card-icon"><i class="fas fa-box"></i></div></div></div>
    <div class="col-lg-2 col-md-4 col-sm-6"><div class="summary-card" style="border-left-color: #4da6ff;"><div><div class="card-value" id="sum-lk">0</div><div class="card-label">Pemilih Lk</div></div><div class="card-icon" style="color: #4da6ff;"><i class="fas fa-mars"></i></div></div></div>
    <div class="col-lg-2 col-md-4 col-sm-6"><div class="summary-card" style="border-left-color: #ff66b2;"><div><div class="card-value" id="sum-pr">0</div><div class="card-label">Pemilih Pr</div></div><div class="card-icon" style="color: #ff66b2;"><i class="fas fa-venus"></i></div></div></div>
    <div class="col-lg-2 col-md-4 col-sm-6"><div class="summary-card" style="border-left-color: #C8102E;"><div><div class="card-value" id="sum-total">0</div><div class="card-label">Total Pemilih</div></div><div class="card-icon" style="color: #C8102E;"><i class="fas fa-users"></i></div></div></div>
</div>

<!-- TABBED TABLE -->
<div class="table-card">
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><button class="nav-link active" id="kec-tab-btn" onclick="switchTab('kec')" type="button">Rekap Kecamatan</button></li>
        <li class="nav-item"><button class="nav-link" id="desa-tab-btn" onclick="switchTab('desa')" type="button">Rekap Desa</button></li>
        <li class="nav-item"><button class="nav-link" id="tps-tab-btn" onclick="switchTab('tps')" type="button">Detail TPS</button></li>
    </ul>

    <div id="drill-info" class="filter-info" style="display: none;">
        <span id="drill-text"></span>
        <button class="btn btn-sm btn-danger" onclick="resetDrill()"><i class="fas fa-times"></i> Tampilkan Semua</button>
    </div>

    <!-- Kontainer Tabel Dinamis -->
    <div id="table-container"></div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpHbswfamDpkWReHbBBYYWsc5Jq5KXz2SkwYwZarW7M-JlEB3DcUHagO0sVLAFCXU__bCk2V7qoJEp/pub?gid=0&single=true&output=csv';

    let rawData = [];
    let filteredData = [];
    let dataTableInstance = null;
    let currentTab = 'kec';
    let activeFilterKec = null;
    let activeFilterDesa = null;

    function getNum(val) {
        if (!val) return 0;
        let cleanVal = val.toString().replace(/\./g, '').replace(',', '.');
        let num = parseInt(cleanVal);
        return isNaN(num) ? 0 : num;
    }

    function formatAngka(angka) {
        return new Intl.NumberFormat('id-ID').format(angka);
    }

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            rawData = results.data.map(row => {
                let cleanRow = {};
                Object.keys(row).forEach(key => {
                    let cleanKey = key.trim().toLowerCase().replace(/\s+/g, ' ');
                    cleanRow[cleanKey] = row[key] ? row[key].trim() : "";
                });
                return cleanRow;
            });
            populateFilters();
            applyFilter();
        }
    });

    function populateFilters() {
        let tahapanSet = new Set();
        rawData.forEach(row => {
            if(row['tahapan']) tahapanSet.add(row['tahapan']);
        });

        let select = document.getElementById('filter-tahapan');
        select.innerHTML = '<option value="all">Semua Tahapan</option>';
        
        Array.from(tahapanSet).sort().forEach(t => {
            let opt = document.createElement('option');
            opt.value = t;
            opt.text = t;
            if(t.toLowerCase().includes('pemilu 2024') || t.toLowerCase().includes('pemilu2024')) {
                opt.selected = true;
            }
            select.appendChild(opt);
        });
    }

    function applyFilter() {
        let selectedTahapan = document.getElementById('filter-tahapan').value;
        filteredData = (selectedTahapan === 'all') ? rawData : rawData.filter(row => row['tahapan'] === selectedTahapan);
        activeFilterKec = null;
        activeFilterDesa = null;
        document.getElementById('drill-info').style.display = 'none';
        calculateSummary();
        switchTab(currentTab);
    }

    function calculateSummary() {
        let uniqueKec = new Set(), uniqueDesa = new Set(), uniqueTps = new Set();
        let totalLk = 0, totalPr = 0, totalAll = 0;

        filteredData.forEach(row => {
            if(row['kode kec']) uniqueKec.add(row['kode kec']);
            if(row['kode desa']) uniqueDesa.add(row['kode desa']);
            if(row['tps']) uniqueTps.add(row['tps']);
            totalLk += getNum(row['laki-laki']);
            totalPr += getNum(row['perempuan']);
            totalAll += getNum(row['jumlah']);
        });

        document.getElementById('sum-kec').innerText = formatAngka(uniqueKec.size);
        document.getElementById('sum-desa').innerText = formatAngka(uniqueDesa.size);
        document.getElementById('sum-tps').innerText = formatAngka(uniqueTps.size);
        document.getElementById('sum-lk').innerText = formatAngka(totalLk);
        document.getElementById('sum-pr').innerText = formatAngka(totalPr);
        document.getElementById('sum-total').innerText = formatAngka(totalAll);
    }

    function drillDown(targetTab, kodeKec, kodeDesa) {
        if(targetTab === 'desa') {
            activeFilterKec = kodeKec;
            activeFilterDesa = null;
            document.getElementById('drill-text').innerText = "Menampilkan Desa di Kecamatan terpilih";
        } else if(targetTab === 'tps') {
            activeFilterDesa = kodeDesa;
            document.getElementById('drill-text').innerText = "Menampilkan TPS di Desa terpilih";
        }
        document.getElementById('drill-info').style.display = 'flex';
        switchTab(targetTab);
    }

    function resetDrill() {
        activeFilterKec = null;
        activeFilterDesa = null;
        document.getElementById('drill-info').style.display = 'none';
        switchTab(currentTab);
    }

    function switchTab(type) {
        currentTab = type;
        
        // Hancurkan DataTable lama jika ada
        if(dataTableInstance) {
            dataTableInstance.destroy(true);
            dataTableInstance = null;
        }

        let heads = [], dataRows = [], foots = [];

        if(type === 'kec') {
            activeFilterKec = null; activeFilterDesa = null;
            document.getElementById('drill-info').style.display = 'none';

            heads = ['No', 'Kode Kec', 'Kecamatan', 'Jml Desa', 'Jml TPS', 'Laki-Laki', 'Perempuan', 'Jumlah', 'Aksi'];
            let grouped = {};

            filteredData.forEach(row => {
                let key = row['kode kec'] || row['kecamatan']; // Fallback jika kode kosong
                if(!key) return;
                if(!grouped[key]) {
                    grouped[key] = { 'kec': row['kecamatan'], 'kode': row['kode kec'], 'desa': new Set(), 'tps': new Set(), 'lk': 0, 'pr': 0, 'jml': 0 };
                }
                if(row['kode desa']) grouped[key].desa.add(row['kode desa']);
                if(row['tps']) grouped[key].tps.add(row['tps']);
                grouped[key].lk += getNum(row['laki-laki']);
                grouped[key].pr += getNum(row['perempuan']);
                grouped[key].jml += getNum(row['jumlah']);
            });

            let no = 1, totLk=0, totPr=0, totJml=0;
            Object.values(grouped).forEach(val => {
                dataRows.push([
                    no++, val.kode, val.kec, val.desa.size, val.tps.size, 
                    formatAngka(val.lk), formatAngka(val.pr), formatAngka(val.jml),
                    `<button class="btn-rekap" onclick="drillDown('desa', '${val.kode}', null)"><i class="fas fa-eye"></i> Lihat Rekap</button>`
                ]);
                totLk += val.lk; totPr += val.pr; totJml += val.jml;
            });
            foots = ['', '', 'TOTAL', '', '', formatAngka(totLk), formatAngka(totPr), formatAngka(totJml), ''];

        } else if(type === 'desa') {
            heads = ['No', 'Kode Desa', 'Desa', 'Kecamatan', 'Jml TPS', 'Laki-Laki', 'Perempuan', 'Jumlah', 'Aksi'];
            let grouped = {};

            filteredData.forEach(row => {
                if(activeFilterKec && row['kode kec'] !== activeFilterKec) return;
                let key = row['kode desa'] || row['desa']; // Fallback
                if(!key) return;

                if(!grouped[key]) {
                    grouped[key] = { 'desa': row['desa'], 'kec': row['kecamatan'], 'kode': row['kode desa'], 'kodekec': row['kode kec'], 'tps': new Set(), 'lk': 0, 'pr': 0, 'jml': 0 };
                }
                if(row['tps']) grouped[key].tps.add(row['tps']);
                grouped[key].lk += getNum(row['laki-laki']);
                grouped[key].pr += getNum(row['perempuan']);
                grouped[key].jml += getNum(row['jumlah']);
            });

            let no = 1, totLk=0, totPr=0, totJml=0;
            Object.values(grouped).forEach(val => {
                dataRows.push([
                    no++, val.kode, val.desa, val.kec, val.tps.size, 
                    formatAngka(val.lk), formatAngka(val.pr), formatAngka(val.jml),
                    `<button class="btn-rekap" onclick="drillDown('tps', '${val.kodekec}', '${val.kode}')"><i class="fas fa-eye"></i> Lihat Rekap</button>`
                ]);
                totLk += val.lk; totPr += val.pr; totJml += val.jml;
            });
            foots = ['', '', 'TOTAL', '', '', formatAngka(totLk), formatAngka(totPr), formatAngka(totJml), ''];

        } else if(type === 'tps') {
            heads = ['No', 'Kecamatan', 'Desa', 'TPS', 'Laki-Laki', 'Perempuan', 'Jumlah'];
            let no = 1, totLk=0, totPr=0, totJml=0;

            filteredData.forEach(row => {
                if(activeFilterKec && row['kode kec'] !== activeFilterKec) return;
                if(activeFilterDesa && row['kode desa'] !== activeFilterDesa) return;

                dataRows.push([
                    no++, row['kecamatan'], row['desa'], row['tps'], 
                    formatAngka(getNum(row['laki-laki'])), 
                    formatAngka(getNum(row['perempuan'])), 
                    formatAngka(getNum(row['jumlah']))
                ]);
                totLk += getNum(row['laki-laki']);
                totPr += getNum(row['perempuan']);
                totJml += getNum(row['jumlah']);
            });
            foots = ['', '', '', 'TOTAL', formatAngka(totLk), formatAngka(totPr), formatAngka(totJml)];
        }

        // Bangun Ulang Tabel dari Nol di dalam DOM
        let tableHtml = `<table id="dynamic-table" class="table table-striped table-bordered" style="width:100%">`;
        tableHtml += `<thead><tr>` + heads.map(h => `<th>${h}</th>`).join('') + `</tr></thead>`;
        tableHtml += `<tfoot><tr>` + foots.map(f => `<th>${f}</th>`).join('') + `</tr></tfoot>`;
        tableHtml += `</table>`;
        
        document.getElementById('table-container').innerHTML = tableHtml;

        // Inisialisasi DataTable Baru
        dataTableInstance = $('#dynamic-table').DataTable({
            data: dataRows,
            language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json' },
            ordering: true,
            pageLength: 10,
            order: [[0, 'asc']],
            columnDefs: [ { orderable: false, targets: (type !== 'tps' ? 8 : -1) } ] 
        });

        document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
        document.getElementById(type+'-tab-btn').classList.add('active');
    }
</script>
</body>
</html>
